# One-command stack: Postgres (auto-seeded) + FastAPI agent + nginx-served UI.
#
#   ANTHROPIC_API_KEY=sk-ant-... docker compose up --build
#   open http://localhost:8080
#
# The database is seeded automatically on first boot from backend/seed/*.sql.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: querypilot
      POSTGRES_PASSWORD: querypilot
      POSTGRES_DB: querypilot
    # Seed scripts in /docker-entrypoint-initdb.d run in filename order on the
    # first initialization of an empty data directory.
    volumes:
      - ./backend/seed/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/seed/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querypilot -d querypilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: postgresql+psycopg://querypilot:querypilot@db:5432/querypilot
      CLIENT_URL: http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
